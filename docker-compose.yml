services:
  token:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: ["python", "server.py"]
    env_file:
      - ./backend/.env
    ports:
      - "5001:5001"
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5001/getToken?name=docker-healthcheck&room=health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  agent:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: ["python", "agent.py", "dev"]
    env_file:
      - ./backend/.env
    depends_on:
      token:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    env_file:
      - ./frontend/.env
    environment:
      # Vite dev-server proxy target (Docker service name)
      TOKEN_SERVER_URL: http://token:5001
    ports:
      - "5173:5173"
    depends_on:
      token:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
