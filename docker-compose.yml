services:
  token:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: ["python", "server.py"]
    env_file:
      - ./microservices/.env
    ports:
      - "5001:5001"
    volumes:
      - ./microservices:/app
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5001/getToken?name=docker-healthcheck&room=health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  agent:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: ["python", "agent.py", "dev"]
    env_file:
      - ./microservices/.env
    depends_on:
      token:
        condition: service_healthy
    volumes:
      - ./microservices:/app

networks:
  default:
    driver: bridge
